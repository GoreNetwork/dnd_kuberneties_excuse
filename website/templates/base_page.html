<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DnD Town Builder</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --gold: #c9a227;
            --gold-light: #f0c040;
            --bg-deep: #0c0e14;
            --bg-card: #141720;
            --bg-card-header: #0f1119;
            --border-dim: #2a2d3a;
            --text-muted-custom: #8a8fa8;
        }

        body {
            background-color: var(--bg-deep);
            color: #ddd8cc;
            font-family: 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
        }

        .navbar {
            background-color: #0a0c12 !important;
            border-bottom: 2px solid var(--gold);
        }
        .navbar-brand {
            color: var(--gold) !important;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .navbar-brand:hover { color: var(--gold-light) !important; }
        .nav-link { color: #aaa8a0 !important; transition: color 0.2s; }
        .nav-link:hover { color: var(--gold) !important; }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 6px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            border-color: #4a4d5e;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .card-header {
            background-color: var(--bg-card-header);
            border-bottom: 1px solid var(--border-dim);
        }

        .section-title {
            color: var(--gold);
            font-size: 1.4rem;
            letter-spacing: 1px;
            border-bottom: 1px solid #2d2a1e;
            padding-bottom: 0.6rem;
            margin-bottom: 1.25rem;
        }

        .card-npc     { border-left: 3px solid #5a6a7a; }
        .card-store   { border-left: 3px solid var(--gold); }
        .card-service { border-left: 3px solid #2a7a8a; }

        .badge-race {
            background-color: #1e3a2e;
            color: #7dcea0;
            font-weight: normal;
            font-size: 0.78rem;
        }
        .badge-gender {
            background-color: #261e3a;
            color: #b39ddb;
            font-weight: normal;
            font-size: 0.78rem;
        }

        .motivation {
            font-style: italic;
            color: var(--text-muted-custom);
            font-size: 0.88rem;
            border-left: 2px solid var(--border-dim);
            padding-left: 0.6rem;
            margin-top: 0.5rem;
        }

        .price-table { font-size: 0.88rem; margin-bottom: 0; }
        .price-table th {
            color: var(--text-muted-custom);
            font-weight: normal;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-color: var(--border-dim);
        }
        .price-table td { border-color: var(--border-dim); color: #ccc8be; }
        .price-table tbody tr:hover td { background-color: #1a1d28; }
        .price-gold { color: var(--gold); font-weight: bold; }

        .item-pill {
            display: inline-block;
            background-color: #1a1d28;
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 0.82rem;
            color: #bbb8b0;
            margin: 2px;
        }

        .section-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
        }
        .label-rare   { color: #d4a017; }
        .label-common { color: var(--text-muted-custom); }

        .town-header {
            text-align: center;
            padding: 2.5rem 1rem 2rem;
            border-bottom: 1px solid var(--border-dim);
            margin-bottom: 2.5rem;
        }
        .town-header h1 {
            color: var(--gold);
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(201,162,39,0.2);
            margin-bottom: 0.25rem;
        }
        .town-header .subtitle {
            color: var(--text-muted-custom);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .owner-line {
            font-size: 0.84rem;
            color: var(--text-muted-custom);
            margin-top: 2px;
        }

        /* Collapse controls */
        .section-title { cursor: pointer; user-select: none; }
        .section-title:hover .collapse-chevron { color: var(--gold-light); }
        .card-header[data-bs-toggle="collapse"] { cursor: pointer; user-select: none; }
        .card-header[data-bs-toggle="collapse"]:hover .collapse-chevron { color: var(--gold-light); }
        .collapse-chevron {
            color: var(--text-muted-custom);
            transition: transform 0.2s ease, color 0.2s;
            display: inline-block;
            line-height: 1;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-lg">
        <a class="navbar-brand" href="/">&#9876; DnD Town Builder</a>
        <button class="navbar-toggler border-secondary" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">&#8635; Generate New Town</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
